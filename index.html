<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repaso Examenes 1º DAW 2026 Tech Hub Euroformac</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <meta name="description" content="Prepárate para tus exámenes con simulacros interactivos basados en tus materiales de estudio.">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body class="dark-theme">
    <div id="app">
        <!-- Header -->
        <header class="main-header">
            <div class="logo">
                <span class="logo-icon">🎓</span>
                <h1>TechHub<span>Euroformac</span></h1>
            </div>
            <nav class="user-nav">
                <div class="progress-info">
                    <span class="label" id="global-avg-label">Media General</span>
                    <div class="progress-bar-small"><div class="fill" id="global-progress-fill" style="width: 0%;"></div></div>
                </div>
            </nav>
        </header>

        <!-- Main Content Area -->
        <main id="main-container">
            <section class="hero">
                <h2>Centro de Alto Rendimiento Académico</h2>
                <p>Repaso Examenes 1º DAW 2026 Tech Hub Euroformac. Prepárate para el éxito.</p>
            </section>

            <!-- Subject Grid -->
            <div id="subject-grid" class="grid-container">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>

            <!-- Syllabus Exams Section -->
            <section class="syllabus-section" id="syllabus-container" style="display:none;">
                <div class="section-divider">
                    <span>📚 EXÁMENES DEL TEMARIO (OFICIALES)</span>
                </div>
                <div id="syllabus-grid" class="grid-container syllabus-grid">
                    <!-- Cards will be injected by app.js -->
                </div>
            </section>

            <!-- Progress & Learning Curve -->
            <section class="progress-section" id="progress-section" style="display:none;">
                <div class="progress-section-header">
                    <h2>📈 Curva de Aprendizaje</h2>
                    <button class="clear-history-btn" onclick="clearHistory()">🗑️ Borrar historial</button>
                </div>
                <div class="progress-layout">
                    <div class="chart-card">
                        <canvas id="learningChart"></canvas>
                    </div>
                    <div class="history-table-card">
                        <h3>Últimos exámenes</h3>
                        <div id="history-table-container"></div>
                    </div>
                </div>
            </section>
        </main>

        <!-- Modal for Exam View -->
        <div id="exam-modal" class="modal hidden">
            <div class="modal-content">
                <button id="close-exam" class="close-btn">&times;</button>
                <div id="exam-engine-root"></div>
            </div>
        </div>

        <footer>
            <p class="footer2">&copy; 2026 <a href="https://JCGM.dev" target="_blank">JCGM.DEV</a> — Elevando tu aprendizaje</p>
        </footer>
    </div>

    <!-- Background Elements -->
    <div class="bg-blur-1"></div>
    <div class="bg-blur-2"></div>

    <script src="js/app.js"></script>
</body>
</html>
